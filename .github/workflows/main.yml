# .github/workflows/ci.yml

name: CI - Build and Test

on:
  push:
  pull_request:

jobs:
  format-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Check formatting (Prettier + Black)
        run: |
          npx prettier --check "*.{json,md}" "src/**/*.ts" "frontend/**/*.{ts,html,css}"
          python -m black --check backend

      - name: Lint frontend (ESLint)
        run: npx eslint "src/**/*.ts" "frontend/**/*.ts"

      - name: Lint backend (Ruff)
        run: python -m ruff check backend

      - name: Run backend tests with coverage
        run: python -m pytest backend/tests --cov --cov-report=xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/frontend/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build TypeScript
        run: npm run build:ts
