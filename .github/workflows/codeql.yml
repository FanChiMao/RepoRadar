# .github/workflows/codeql.yml

name: WhiteBox Security Scan (CodeQL)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday 09:00 Taiwan time / Monday 01:00 UTC
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Use "security-extended" for more (noisier) coverage if desired
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  alert-gate:
    name: Code Scanning Alert Gate
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
      security-events: read
    steps:
      - name: Gate high-severity code scanning alerts
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const shouldFail =
              context.eventName === 'pull_request' ||
              context.eventName === 'schedule' ||
              context.eventName === 'workflow_dispatch';
            const params = {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            };

            if (context.eventName === 'pull_request') {
              params.pr = context.payload.pull_request.number;
            }

            const alerts = await github.paginate(
              github.rest.codeScanning.listAlertsForRepo,
              params,
            );

            const blockingRuleSeverities = new Set(['critical', 'high', 'error']);
            const blockingSecuritySeverities = new Set(['critical', 'high']);
            const productPathPrefixes = ['backend/', 'frontend/', 'src/'];
            const ignoredPathPrefixes = ['backend/tests/', 'frontend/tests/'];
            const blocking = alerts.filter((alert) => {
              const path = alert.most_recent_instance?.location?.path || '';
              if (
                !productPathPrefixes.some((prefix) => path.startsWith(prefix)) ||
                ignoredPathPrefixes.some((prefix) => path.startsWith(prefix))
              ) {
                return false;
              }
              const severity = String(alert.rule?.severity || '').toLowerCase();
              const securitySeverity = String(
                alert.rule?.security_severity_level || '',
              ).toLowerCase();
              return (
                blockingRuleSeverities.has(severity) ||
                blockingSecuritySeverities.has(securitySeverity)
              );
            });

            if (blocking.length === 0) {
              core.info('No open high-severity code scanning alerts found.');
              return;
            }

            core.summary.addHeading('Blocking code scanning alerts');
            for (const alert of blocking.slice(0, 20)) {
              const location = alert.most_recent_instance?.location;
              const path = location?.path || 'unknown path';
              const line = location?.start_line || '?';
              const severity =
                alert.rule?.security_severity_level || alert.rule?.severity || 'unknown';
              core.summary.addRaw(
                `- #${alert.number} ${alert.rule?.id || 'unknown rule'} ` +
                  `(${severity}) at ${path}:${line} - ${alert.html_url}\n`,
              );
            }
            if (blocking.length > 20) {
              core.summary.addRaw(`- ...and ${blocking.length - 20} more alerts.\n`);
            }
            await core.summary.write();

            const message =
              `${blocking.length} open high-severity code scanning alert(s) found.`;
            if (shouldFail) {
              core.setFailed(message);
            } else {
              core.warning(`${message} Existing main-branch alerts are reported only.`);
            }
