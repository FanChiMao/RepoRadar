name: CD - Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller
      
      - name: Write backend .env from secrets
        shell: pwsh
        run: |
          @"
          AZURE_LLM_ENABLED=${{ secrets.AZURE_LLM_ENABLED }}
          AZURE_LLM_ENDPOINT=${{ secrets.AZURE_LLM_ENDPOINT }}
          AZURE_LLM_API_KEY=${{ secrets.AZURE_LLM_API_KEY }}
          AZURE_LLM_API_VERSION=${{ secrets.AZURE_LLM_API_VERSION }}
          AZURE_LLM_MODEL_1=${{ secrets.AZURE_LLM_MODEL_1 }}
          AZURE_LLM_MODEL_2=${{ secrets.AZURE_LLM_MODEL_2 }}
          AZURE_LLM_MODEL_3=${{ secrets.AZURE_LLM_MODEL_3 }}
          "@ | Set-Content -Path backend/.env -Encoding utf8NoBOM

      - name: Check formatting (Prettier + Black)
        run: |
          npx prettier --check "*.{json,md}" "src/**/*.ts" "frontend/**/*.{ts,html,css}"
          python -m black --check backend

      - name: Lint frontend (ESLint)
        run: npx eslint "src/**/*.ts" "frontend/**/*.ts"

      - name: Lint backend (Ruff)
        run: python -m ruff check backend

      - name: Run backend tests
        env:
          AZURE_LLM_ENABLED: ${{ secrets.AZURE_LLM_ENABLED }}
          AZURE_LLM_ENDPOINT: ${{ secrets.AZURE_LLM_ENDPOINT }}
          AZURE_LLM_API_KEY: ${{ secrets.AZURE_LLM_API_KEY }}
          AZURE_LLM_API_VERSION: ${{ secrets.AZURE_LLM_API_VERSION }}
          AZURE_LLM_MODEL_1: ${{ secrets.AZURE_LLM_MODEL_1 }}
          AZURE_LLM_MODEL_2: ${{ secrets.AZURE_LLM_MODEL_2 }}
          AZURE_LLM_MODEL_3: ${{ secrets.AZURE_LLM_MODEL_3 }}
        run: python -m pytest backend/tests

      - name: Run frontend tests
        run: npm run test:coverage

      - name: Build TypeScript
        run: npm run build:ts

      - name: Build backend
        run: npm run pack:backend

      - name: Build and publish Electron app
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}