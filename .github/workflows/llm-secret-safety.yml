# .github/workflows/llm-secret-safety.yml
#
# Targeted security checks for LLM/API secret handling. This complements the
# generic ZAP DAST workflow by proving that canary secrets do not leak through
# public API responses, backend logs, persisted runtime data, or frontend build
# artifacts.

name: BlackBox Security Scan (LLM/API Secret Safety)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-pattern-scan:
    name: Secret Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  llm-secret-blackbox:
    name: LLM Secret Blackbox Smoke
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      REPO_RADAR_DATA_DIR: /tmp/repo-radar-data
      REPO_RADAR_SESSION_TOKEN: BLACKBOX_SESSION_TOKEN
      REPO_RADAR_SECRET_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      AZURE_LLM_ENABLED: "true"
      AZURE_LLM_ENDPOINT: https://azure.example.invalid
      AZURE_LLM_API_KEY: BLACKBOX_AZURE_KEY_SHOULD_NOT_LEAK
      AZURE_LLM_API_VERSION: "2025-04-01-preview"
      AZURE_LLM_MODEL_1: "Fake GPT|openai|fake-deployment"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend
        working-directory: backend
        run: |
          nohup python app.py --port 8765 > backend.log 2>&1 &
          echo "Waiting for backend /api/health ..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/api/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start within 60s"
          cat backend.log
          exit 1

      - name: Verify session token enforcement
        run: |
          status="$(curl -s -o /tmp/no-token.json -w "%{http_code}" http://127.0.0.1:8765/api/config)"
          test "$status" = "401"

          status="$(curl -s -o /tmp/wrong-token.json -w "%{http_code}" -H "X-Session-Token: wrong" http://127.0.0.1:8765/api/config)"
          test "$status" = "401"

      - name: Seed fake secrets through public API
        run: |
          curl -sf \
            -H "Content-Type: application/json" \
            -H "X-Session-Token: BLACKBOX_SESSION_TOKEN" \
            -d '{
              "active_provider": "github",
              "connections": {
                "github": {
                  "base_url": "https://github.com",
                  "project_ref": "owner/repo",
                  "token": "BLACKBOX_GITHUB_TOKEN_SHOULD_NOT_LEAK"
                }
              },
              "gemini_api_key": "BLACKBOX_GEMINI_KEY_SHOULD_NOT_LEAK"
            }' \
            http://127.0.0.1:8765/api/config > /tmp/post-config.json

      - name: Assert public config masks secrets
        run: |
          curl -sf \
            -H "X-Session-Token: BLACKBOX_SESSION_TOKEN" \
            http://127.0.0.1:8765/api/config > /tmp/get-config.json

          python - <<'PY'
          import json
          from pathlib import Path

          post_config = json.loads(Path("/tmp/post-config.json").read_text())
          get_config = json.loads(Path("/tmp/get-config.json").read_text())

          for payload in (post_config, get_config):
              github = payload["connections"]["github"]
              assert github["token"] == ""
              assert github["token_configured"] is True
              assert payload["gemini_api_key"] == ""
              assert payload["gemini_api_key_configured"] is True
          PY

      - name: Assert canary secrets are not externally visible
        run: |
          mkdir -p /tmp/secret-safety-scan
          cp /tmp/post-config.json /tmp/secret-safety-scan/
          cp /tmp/get-config.json /tmp/secret-safety-scan/
          cp backend/backend.log /tmp/secret-safety-scan/

          if grep -R -E "BLACKBOX_(AZURE|GEMINI|GITHUB)_.*SHOULD_NOT_LEAK" /tmp/secret-safety-scan backend/backend.log; then
            echo "A canary secret leaked through API output or backend logs."
            exit 1
          fi

      - name: Assert persisted runtime data encrypts secrets at rest
        run: |
          test -d "$REPO_RADAR_DATA_DIR"
          if grep -R -E "BLACKBOX_(GEMINI|GITHUB)_.*SHOULD_NOT_LEAK" "$REPO_RADAR_DATA_DIR"; then
            echo "A canary secret was persisted in plaintext runtime data."
            exit 1
          fi

  frontend-artifact-secret-scan:
    name: Frontend Artifact Secret Scan
    runs-on: ubuntu-latest
    env:
      AZURE_LLM_API_KEY: BLACKBOX_AZURE_KEY_SHOULD_NOT_LEAK
      GEMINI_API_KEY: BLACKBOX_GEMINI_KEY_SHOULD_NOT_LEAK
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Assert frontend artifacts do not contain canary secrets
        run: |
          if grep -R -E "BLACKBOX_(AZURE|GEMINI)_.*SHOULD_NOT_LEAK" dist frontend; then
            echo "A canary secret leaked into frontend artifacts."
            exit 1
          fi
