coverage:
  status:
    project:
      default:
        informational: true
      backend:
        flags:
          - backend
        informational: true
      frontend:
        flags:
          - frontend
        informational: true

flag_management:
  individual_flags:
    - name: backend
      paths:
        - backend/
      carryforward: true
    - name: frontend
      paths:
        - frontend/scripts/lib/
      carryforward: true

component_management:
  individual_components:
    - component_id: backend
      name: Backend (Python)
      paths:
        - backend/
    - component_id: frontend
      name: Frontend (TypeScript)
      paths:
        - frontend/scripts/lib/
