<section id="view-preferences" class="workspace-view">
  <section class="page-hero">
    <div>
      <div class="view-eyebrow">Tools / Preference</div>
      <h2 class="view-title">個人偏好</h2>
      <p class="view-subtitle">調整字體大小與明暗主題，偏好會保存在本機。</p>
    </div>
  </section>

  <div class="tool-grid preferences-grid">
    <section class="panel preference-panel">
      <div class="section-title-row">
        <h2>主題模式</h2>
      </div>
      <div class="preference-choice-row">
        <button id="pref-theme-dark" class="pref-choice-btn active">深色</button>
        <button id="pref-theme-light" class="pref-choice-btn">淺色</button>
      </div>
    </section>

    <section class="panel preference-panel">
      <div class="section-title-row">
        <h2>字體大小</h2>
      </div>
      <div class="scale-row">
        <input id="pref-scale-range" type="range" min="90" max="120" step="5" value="100" />
        <strong id="pref-scale-value">100%</strong>
      </div>
      <p class="preference-hint">可以透過 crtl + 滑鼠滾輪調整頁面比例。</p>
      <div class="button-row compact">
        <button id="pref-scale-reset" class="ghost-btn">回到預設</button>
      </div>
    </section>

    <section class="panel preference-panel">
      <div class="section-title-row">
        <h2>Gemini LLM Models</h2>
      </div>
      <label for="pref-gemini-model-list">LLM 模型列表</label>
      <textarea id="pref-gemini-model-list" class="arrange-textarea" rows="6">
gemini-2.5-pro
gemini-3.5-flash
gemini-2.5-flash
gemma-4-31b-it
gemma-4-26b-a4b-it</textarea
      >
      <p class="preference-hint">
        一行一個 model。各功能頁只會顯示自己的可用模型；此清單用於記錄目前專案支援的整體模型。
      </p>
    </section>
  </div>
</section>
